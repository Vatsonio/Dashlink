services:
  backend:
    build:
      context: ./backend
    container_name: dashlink-api-dev
    volumes:
      - ./backend:/app
      - config_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8000:8000"
    environment:
      - DL_DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - dashlink

  frontend:
    build:
      context: ./frontend
      target: deps
    container_name: dashlink-ui-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    command: npm run dev
    depends_on:
      - backend
    networks:
      - dashlink

volumes:
  config_data:

networks:
  dashlink:
    driver: bridge
