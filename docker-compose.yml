services:
  backend:
    build:
      context: ./backend
    container_name: dashlink-api
    restart: unless-stopped
    volumes:
      - config_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DL_DEBUG=${DL_DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - dashlink

  frontend:
    build:
      context: ./frontend
    container_name: dashlink-ui
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dashlink

  caddy:
    image: caddy:2-alpine
    container_name: dashlink-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - frontend
      - backend
    networks:
      - dashlink

volumes:
  config_data:
  caddy_data:
  caddy_config:

networks:
  dashlink:
    driver: bridge
